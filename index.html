<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2b</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        h1 {
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .nav-container {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            text-decoration: none;
            color: white;
            background-color: #0071e3;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn:hover {
            background-color: #0077ed;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        /* 針對不同按鈕給予一點色彩區分（可選） */
        .btn-galaxy { background-color: #3c4043; }
        .btn-iphone { background-color: #000000; }
        .btn-mac { background-color: #515154; }

    </style>
</head>
<body>

    <h1>選擇你想查看的裝置</h1>

    <div class="nav-container">
        <a href="galaxy.jpg" class="btn btn-galaxy">Galaxy</a>
        <a href="iphone.jpg" class="btn btn-iphone">iPhone</a>
        <a href="mac.jpg" class="btn btn-mac">Mac</a>
    </div>

    <p style="color: #86868b; font-size: 14px;">點擊上方按鈕查看圖片</p>

</body>
</html>
